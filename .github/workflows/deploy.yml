name: Build and Deploy

on:
  push:
    branches: [ main ]

env:
  AWS_REGION: ap-south-1
  ECR_URL: ${{ secrets.ECR_URL }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build JAR
        run: mvn clean package -DskipTests

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image
        env:
          ECR_REPO: 083777493383.dkr.ecr.ap-south-1.amazonaws.com/todoapp-repo
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t todoapp .
          docker tag todoapp:latest $ECR_REPO:$IMAGE_TAG
          docker push $ECR_REPO:$IMAGE_TAG

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        env:
          IMAGE_TAG: ${{ github.sha }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: IMAGE_TAG
          script: |
            sudo aws ecr get-login-password --region ap-south-1 | \
              sudo docker login --username AWS --password-stdin 083777493383.dkr.ecr.ap-south-1.amazonaws.com
            sudo docker pull 083777493383.dkr.ecr.ap-south-1.amazonaws.com/todoapp-repo:$IMAGE_TAG
            sudo docker stop todoapp || true
            sudo docker rm todoapp || true
            sudo docker run -d --name todoapp -p 8080:8080 \
              -e DB_HOST=todo-mysql-db.cbo0c6qogjdf.ap-south-1.rds.amazonaws.com \
              -e DB_PORT=3306 \
              -e DB_NAME=tododb \
              -e DB_USER=$(sudo aws ssm get-parameter --name "/todoapp/db_username" --with-decryption --query Parameter.Value --output text --region ap-south-1) \
              -e DB_PASS=$(sudo aws ssm get-parameter --name "/todoapp/db_password" --with-decryption --query Parameter.Value --output text --region ap-south-1) \
              083777493383.dkr.ecr.ap-south-1.amazonaws.com/todoapp-repo:$IMAGE_TAG
